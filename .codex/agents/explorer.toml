# Codex agent role: cheap read-only scout (overrides the built-in `explorer`
# role to pin the scout tier). Counterpart of the Claude-side Explore/haiku
# routing in .claude/skills/cost-efficient-delegation/SKILL.md — the Claude
# side is canonical; keep this file consistent with it by hand.
# If spawning fails on the model slug, pick the closest cheap tier from the
# current models list and update the skill's decision table to match.
name = "explorer"
description = "Read-only scout for codebase/file exploration, fact lookup, and log/status checks. Cheapest tier; returns conclusions with file:line references, never raw dumps."
model = "gpt-5.6-luna"
model_reasoning_effort = "low"
sandbox_mode = "read-only"
developer_instructions = """
Stay in exploration mode: locate code, trace real execution paths, and answer
exactly the question you were given. Cite files and symbols as path:line.
Prefer targeted search and bounded file reads over broad scans. Do not
propose fixes and do not modify anything. Your final message is returned to
the orchestrator as data: a compact factual report — conclusions plus
citations, not raw tool output. Do not spawn further agents.
"""
