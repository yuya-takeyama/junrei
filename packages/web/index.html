<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junrei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap"
    />
    <script>
      // Apply a stored explicit theme before first paint to avoid a flash of
      // the wrong theme. No stored choice = fall through to CSS defaults
      // (dark, honoring prefers-color-scheme) — see styles/tokens.css.
      (() => {
        var stored;
        try {
          stored = localStorage.getItem("junrei.theme");
        } catch {
          // Storage unavailable — CSS defaults apply.
        }
        if (stored === "dark" || stored === "light") {
          document.documentElement.dataset.theme = stored;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
